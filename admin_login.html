<body class="bg-base bg-admin d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent pt-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <img src="assets/logo.png" alt="Cit-E Logo">
                Cit-E Cycling
            </a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html"><i class="fa-solid fa-house me-1"></i> Home</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container d-flex flex-grow-1 align-items-center justify-content-center my-4">
        <div class="glass-card p-5 w-100" style="max-width: 450px;">
            <a href="index.html" class="text-white text-decoration-none mb-3 d-inline-block">
                <i class="fa-solid fa-arrow-left me-1"></i> Back
            </a>
            <h2 class="mb-4 fw-bold text-center text-white">Admin Login</h2>
            
            <form action="login.php" method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label text-white"><i class="fa-solid fa-user-shield me-1"></i> Username</label>
                    <input type="text" class="form-control glass-input" id="username" name="username" required>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label text-white"><i class="fa-solid fa-key me-1"></i> Password</label>
                    <input type="password" class="form-control glass-input" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn btn-cyan-primary w-100 fw-bold py-2">
                    Login <i class="fa-solid fa-arrow-right-to-bracket ms-1"></i>
                </button>
            </form>
        </div>
